name: Sync public Midynamite (v2.0) -> Midynamite_Private

on:
  push:
    branches: [v2.0]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync_public_to_private:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout SOURCE (public repo)
      - name: Checkout SOURCE (public Midynamite)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2️⃣ Clone TARGET (private repo) into a folder called "target"
      - name: Clone TARGET (Midynamite_Private)
        run: |
          git clone "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/RomainDereu/Midynamite_Private.git" target
          cd target
          git checkout main

      # 3️⃣ Configure Git in TARGET
      - name: Configure Git
        working-directory: target
        run: |
          git config user.name "midynamite-sync-bot"
          git config user.email "midynamite-sync-bot@users.noreply.github.com"

      # 4️⃣ Replace target/Midynamite with full SOURCE repo
      - name: Sync SOURCE -> TARGET/Midynamite
        run: |
          rm -rf target/Midynamite
          mkdir -p target/Midynamite
          rsync -a \
            --exclude ".git/" \
            --exclude ".github/workflows/" \
            ./ target/Midynamite/

      # 5️⃣ Commit if changes exist
      - name: Commit changes
        working-directory: target
        run: |
          git add -A Midynamite
          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi
          git commit -m "Auto-sync public Midynamite v2.0 @ ${GITHUB_SHA::7}"

      # 6️⃣ Push directly to main
      - name: Push to main
        working-directory: target
        run: |
          git push origin main
