name: Sync Midynamite (v2.0) into Midynamite_Private

on:
  push:
    branches: [v2.0]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the source repo (Midynamite)
      - name: Checkout Midynamite
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2️⃣ Clone the private repo
      - name: Clone Midynamite_Private
        run: |
          git clone "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/RomainDereu/Midynamite_Private.git" private
          cd private
          git checkout main

      # 3️⃣ Configure git
      - name: Configure Git
        working-directory: private
        run: |
          git config user.name "midynamite-sync-bot"
          git config user.email "midynamite-sync-bot@users.noreply.github.com"

      # 4️⃣ Sync files (overwrite Midynamite folder only)
      - name: Sync files into Midynamite/
        run: |
          mkdir -p private/Midynamite
          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/workflows/" \
            ./ private/Midynamite/

      # 5️⃣ Commit if changes exist
      - name: Commit changes
        working-directory: private
        run: |
          git add -A Midynamite
          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi
          git commit -m "Auto-sync Midynamite v2.0 @ ${GITHUB_SHA::7}"

      # 6️⃣ Push directly to main
      - name: Push to main
        working-directory: private
        run: |
          git push origin main
