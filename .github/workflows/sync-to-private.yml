name: Sync public Midynamite (v2.0) -> Midynamite_Private/Midynamite

on:
  push:
    branches: [v2.0]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync_public_to_private:
    runs-on: ubuntu-latest
    steps:
      # SOURCE (public): checkout into ./src
      - name: Checkout SOURCE (public Midynamite)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: src

      # TARGET (private): clone into ./dst
      - name: Clone TARGET (Midynamite_Private)
        run: |
          git clone "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/RomainDereu/Midynamite_Private.git" dst
          cd dst
          git checkout main

      - name: Configure Git in TARGET
        working-directory: dst
        run: |
          git config user.name "midynamite-sync-bot"
          git config user.email "midynamite-sync-bot@users.noreply.github.com"

      # Copy ENTIRE SOURCE repo into TARGET/Midynamite/
      - name: Sync SOURCE -> TARGET/Midynamite/
        run: |
          rm -rf dst/Midynamite
          mkdir -p dst/Midynamite
          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/workflows/" \
            src/ dst/Midynamite/

      - name: Commit changes (if any)
        working-directory: dst
        run: |
          git add -A Midynamite
          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi
          git commit -m "Auto-sync public Midynamite v2.0 @ ${GITHUB_SHA::7}"

      - name: Push to main
        working-directory: dst
        run: |
          git push origin main
